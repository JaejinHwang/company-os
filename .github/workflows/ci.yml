name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel earlier runs on the same branch when a new commit comes in.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Policy · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Validate policy schema
        run: npm run check:policy

      - name: Build (tsc + vite)
        run: npm run build
